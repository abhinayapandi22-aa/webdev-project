<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abhinaya  | Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;scroll-behavior:smooth;}
body{background:linear-gradient(135deg,#2C1810 0%,#3D1F1A 25%,#4A2C2A 50%,#5C4033 75%,#8B4513 100%);color:#000000;overflow-x:hidden;position:relative;}

/* BACKGROUND ANIMATION */
.blob{
position:fixed;
width:400px;height:400px;
background:linear-gradient(135deg,#8B0000,#A52A2A);
border-radius:50%;
filter:blur(100px);
animation:move 12s infinite alternate;
z-index:-1;
opacity:0.4;
}
.blob:nth-child(1){top:5%;left:5%;background:linear-gradient(135deg,#800000,#B22222);}
.blob:nth-child(2){bottom:10%;right:5%;animation-delay:4s;background:linear-gradient(135deg,#4A2C2A,#663399);}

@keyframes move{
0%{transform:translate(0,0) scale(1);}
50%{transform:translate(40px,-30px) scale(1.1);}
100%{transform:translate(-30px,40px) scale(0.95);}
}

/* FLOWER DECORATIONS */
.flower{position:fixed;z-index:999;opacity:0.7;pointer-events:none;}
.flower1{top:15%;left:10%;animation:petalFloat 8s infinite ease-in-out;}
.flower2{top:20%;right:15%;animation:petalFloat 10s infinite ease-in-out reverse;}
.flower3{bottom:25%;left:8%;animation:petalFloat 9s infinite ease-in-out;}
.flower4{bottom:15%;right:12%;animation:petalFloat 11s infinite ease-in-out reverse;}
.flower5{top:60%;left:5%;animation:petalFloat 7s infinite ease-in-out;}
.flower6{top:75%;right:8%;animation:petalFloat 12s infinite ease-in-out reverse;}

.flower-inner{
width:40px;height:40px;border-radius:50% 0;
background:linear-gradient(45deg,#FF4040,#DC143C,#B22222,#8B0000);
box-shadow:0 0 20px rgba(178,34,34,0.6);
position:relative;
animation:rotateFlower 4s linear infinite;
}
.flower-inner::before,
.flower-inner::after{
content:'';position:absolute;width:20px;height:20px;border-radius:50% 0;
background:linear-gradient(45deg,#FF69B4,#C71585,#8B008B);
top:50%;transform:translateY(-50%);
}
.flower-inner::before{left:-10px;}
.flower-inner::after{right:-10px;}

@keyframes petalFloat{
0%,100%{transform:translateY(0) rotate(0deg) scale(1);}
25%{transform:translateY(-15px) rotate(90deg) scale(1.1);}
50%{transform:translateY(-8px) rotate(180deg) scale(0.9);}
75%{transform:translateY(-20px) rotate(270deg) scale(1.05);}
}
@keyframes rotateFlower{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}

/* NAV */
nav{
position:fixed;top:0;width:100%;
display:flex;justify-content:space-between;align-items:center;
padding:15px 8%;background:rgba(75,0,130,.95);
backdrop-filter:blur(12px);
box-shadow:0 4px 25px rgba(139,0,0,.3);z-index:1000;
border-bottom:3px solid #8B0000;
}
.logo{font-size:24px;font-weight:700;color:#000000;text-shadow:1px 1px 2px rgba(255,255,255,0.3);}
nav ul{display:flex;gap:22px;list-style:none;}
nav a{text-decoration:none;color:#000000;font-weight:500;transition:.3s;text-shadow:1px 1px 1px rgba(255,255,255,0.5);}
nav a:hover{color:#FF4040;text-shadow:1px 1px 2px rgba(255,64,64,0.8);}

/* HERO */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
gap:40px;
padding:20px;
background:linear-gradient(180deg,#2C1810 0%,#4A2C2A 30%,#663399 60%,#8B0000 100%);
position:relative;
overflow:hidden;
}
.hero::before{
content:'';position:absolute;top:0;left:0;right:0;bottom:0;
background:radial-gradient(circle at 20% 80%,rgba(255,20,147,0.2) 0%,transparent 50%),
radial-gradient(circle at 80% 20%,rgba(139,0,0,0.3) 0%,transparent 50%),
radial-gradient(circle at 40% 40%,rgba(178,34,34,0.15) 0%,transparent 50%);
}
.hero img{
width:300px;height:300px;
border-radius:20px;
object-fit:cover;
box-shadow:0 20px 60px rgba(139,0,0,.4),inset 0 0 20px rgba(255,255,255,0.1);
animation:float 3s ease-in-out infinite;
border:4px solid #B22222;
}
@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-12px);}
}
.hero-text h1{font-size:3rem;color:#000000;text-shadow:2px 2px 4px rgba(255,255,255,0.8);}
.hero-text p{margin-top:12px;color:#000000;font-size:1.1rem;text-shadow:1px 1px 2px rgba(255,255,255,0.7);}

section{padding:90px 10%;}
.section-title{
font-size:2rem;color:#000000;margin-bottom:25px;position:relative;
text-shadow:1px 1px 2px rgba(255,255,255,0.5);
}
.section-title::after{
content:"";width:60px;height:3px;background:linear-gradient(90deg,#FF4040,#B22222,#8B0000);
position:absolute;left:0;bottom:-8px;
box-shadow:0 0 10px rgba(255,64,64,0.6);
}

/* ABOUT */
.about p{line-height:1.8;margin-bottom:10px;color:#000000;text-shadow:1px 1px 1px rgba(255,255,255,0.4);}

/* SKILLS */
.skill{margin-bottom:20px;}
.skill h4{display:flex;justify-content:space-between;margin-bottom:8px;color:#000000;text-shadow:1px 1px 1px rgba(255,255,255,0.3);}
.progress{background:linear-gradient(90deg,#FF69B4,#C71585);border-radius:20px;overflow:hidden;box-shadow:inset 0 2px 10px rgba(0,0,0,0.2);}
.progress-bar{
height:10px;
background:linear-gradient(90deg,#FF4040,#DC143C,#B22222,#8B0000);
animation:fill 2s forwards;
box-shadow:0 0 15px rgba(255,64,64,0.8);
}
@keyframes fill{from{width:0;}}

/* CERTIFICATES */
.cert-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}
.cert-card{
background:linear-gradient(145deg,#2C1810,#4A2C2A);
padding:10px;
border-radius:12px;
box-shadow:0 8px 30px rgba(139,0,0,.3),inset 0 1px 0 rgba(255,255,255,0
